<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>西安交通大学港澳台合办活动电子问卷</title>
  <style>
    :root {
      --paper: #f7f4ec;
      --surface: #fffdf8;
      --surface-strong: #fff8e8;
      --ink: #23201d;
      --muted: #6e665c;
      --line: #ded2bf;
      --brand: #8d1d2c;
      --brand-deep: #641622;
      --gold: #c79a2b;
      --green: #2f6f5e;
      --error: #b42318;
      --shadow: 0 20px 55px rgba(76, 44, 28, 0.12);
      --radius: 8px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      color: var(--ink);
      background:
        linear-gradient(135deg, rgba(141, 29, 44, 0.10), transparent 32%),
        linear-gradient(315deg, rgba(199, 154, 43, 0.14), transparent 38%),
        var(--paper);
      font-family: "Microsoft YaHei", "PingFang SC", "Noto Sans CJK SC", sans-serif;
      line-height: 1.55;
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .page {
      width: min(1180px, calc(100% - 32px));
      margin: 0 auto;
      padding: 34px 0 42px;
    }

    .masthead {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 18px;
      align-items: end;
      padding: 28px 0 20px;
      border-bottom: 3px solid var(--brand);
    }

    .kicker {
      margin: 0 0 8px;
      color: var(--brand);
      font-size: 14px;
      font-weight: 700;
      letter-spacing: 0;
    }

    h1 {
      margin: 0;
      max-width: 780px;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: clamp(32px, 6vw, 58px);
      line-height: 1.06;
      letter-spacing: 0;
    }

    .summary-strip {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 10px;
      min-width: min(420px, 100%);
    }

    .summary-item {
      padding: 12px 14px;
      background: rgba(255, 253, 248, 0.82);
      border: 1px solid rgba(141, 29, 44, 0.20);
      border-radius: var(--radius);
    }

    .summary-value {
      display: block;
      color: var(--brand);
      font-size: 24px;
      font-weight: 800;
      line-height: 1;
    }

    .summary-label {
      display: block;
      margin-top: 6px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    main {
      display: grid;
      grid-template-columns: minmax(0, 1.05fr) minmax(360px, 0.95fr);
      gap: 22px;
      align-items: start;
      margin-top: 26px;
    }

    section {
      min-width: 0;
    }

    .panel {
      background: rgba(255, 253, 248, 0.92);
      border: 1px solid rgba(111, 85, 53, 0.22);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
    }

    .panel-header {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: space-between;
      padding: 18px 20px;
      background: linear-gradient(90deg, rgba(141, 29, 44, 0.10), rgba(199, 154, 43, 0.12));
      border-bottom: 1px solid var(--line);
    }

    h2 {
      margin: 0;
      font-family: Georgia, "Times New Roman", "Songti SC", serif;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: 0;
    }

    .panel-body {
      padding: 20px;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }

    .field {
      display: grid;
      gap: 7px;
      min-width: 0;
    }

    .field.full {
      grid-column: 1 / -1;
    }

    label {
      color: var(--ink);
      font-size: 14px;
      font-weight: 700;
    }

    .required::after {
      content: " *";
      color: var(--error);
    }

    input,
    select {
      width: 100%;
      min-height: 42px;
      padding: 10px 12px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      outline: none;
      transition: border-color 0.18s ease, box-shadow 0.18s ease, background-color 0.18s ease;
    }

    input:focus,
    select:focus {
      border-color: var(--brand);
      box-shadow: 0 0 0 3px rgba(141, 29, 44, 0.12);
      background: #fffdfb;
    }

    input.invalid,
    select.invalid {
      border-color: var(--error);
      box-shadow: 0 0 0 3px rgba(180, 35, 24, 0.10);
    }

    .contacts {
      display: grid;
      gap: 14px;
      margin-top: 20px;
    }

    .contact-row {
      position: relative;
      padding: 18px;
      background: var(--surface-strong);
      border: 1px solid rgba(199, 154, 43, 0.35);
      border-left: 5px solid var(--gold);
      border-radius: var(--radius);
    }

    .contact-title {
      display: flex;
      gap: 12px;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 14px;
    }

    .contact-title strong {
      font-size: 15px;
    }

    .actions,
    .row-actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      align-items: center;
    }

    button {
      display: inline-flex;
      gap: 7px;
      align-items: center;
      justify-content: center;
      min-height: 40px;
      padding: 10px 14px;
      color: var(--ink);
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 6px;
      cursor: pointer;
      transition: transform 0.16s ease, box-shadow 0.16s ease, background 0.16s ease, border-color 0.16s ease;
      user-select: none;
    }

    button:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 22px rgba(76, 44, 28, 0.12);
    }

    button:active {
      transform: translateY(0);
    }

    .btn-primary {
      color: #fff;
      background: var(--brand);
      border-color: var(--brand);
    }

    .btn-primary:hover {
      background: var(--brand-deep);
      border-color: var(--brand-deep);
    }

    .btn-success {
      color: #fff;
      background: var(--green);
      border-color: var(--green);
    }

    .btn-ghost {
      background: transparent;
      border-color: rgba(141, 29, 44, 0.28);
    }

    .btn-danger {
      color: var(--error);
      background: #fff7f5;
      border-color: rgba(180, 35, 24, 0.32);
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 18px;
      border-top: 1px solid var(--line);
    }

    .message {
      margin-top: 14px;
      padding: 12px 14px;
      border-radius: 6px;
      border: 1px solid transparent;
    }

    .message:empty {
      display: none;
    }

    .message.error {
      color: #7a160f;
      background: #fff4f2;
      border-color: rgba(180, 35, 24, 0.28);
    }

    .message.success {
      color: #1f4e42;
      background: #eefaf6;
      border-color: rgba(47, 111, 94, 0.28);
    }

    .preview {
      display: grid;
      gap: 14px;
    }

    .table-wrap {
      overflow: auto;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: #fff;
      max-height: 520px;
    }

    table {
      width: 100%;
      min-width: 760px;
      border-collapse: collapse;
      font-size: 14px;
    }

    th,
    td {
      padding: 11px 12px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid #eee5d6;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--brand-deep);
      background: #fff8e8;
      font-weight: 800;
      white-space: nowrap;
    }

    td {
      overflow-wrap: anywhere;
    }

    tr:last-child td {
      border-bottom: 0;
    }

    .empty-state {
      padding: 34px 24px;
      color: var(--muted);
      text-align: center;
      background: #fff;
      border: 1px dashed var(--line);
      border-radius: var(--radius);
    }

    .microcopy {
      margin: 8px 0 0;
      color: var(--muted);
      font-size: 13px;
    }

    .sr-only {
      position: absolute;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    @media (max-width: 920px) {
      .masthead,
      main {
        grid-template-columns: 1fr;
      }

      .summary-strip {
        min-width: 0;
      }
    }

    @media (max-width: 640px) {
      .page {
        width: min(100% - 20px, 1180px);
        padding-top: 18px;
      }

      .masthead {
        padding-top: 16px;
      }

      .summary-strip,
      .form-grid {
        grid-template-columns: 1fr;
      }

      .panel-header,
      .toolbar,
      .contact-title {
        align-items: stretch;
        flex-direction: column;
      }

      .panel-body {
        padding: 16px;
      }

      .contact-row {
        padding: 15px;
      }

      button {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <header class="masthead">
      <div>
        <p class="kicker">西安交通大学 · 港澳台学校合办活动统计</p>
        <h1>合办活动电子问卷</h1>
      </div>
      <div class="summary-strip" aria-label="已保存统计">
        <div class="summary-item">
          <span class="summary-value" id="activityCount">0</span>
          <span class="summary-label">已保存活动</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="rowCount">0</span>
          <span class="summary-label">明细行</span>
        </div>
        <div class="summary-item">
          <span class="summary-value" id="schoolCount">0</span>
          <span class="summary-label">涉及学校</span>
        </div>
      </div>
    </header>

    <main>
      <section class="panel" aria-labelledby="formTitle">
        <div class="panel-header">
          <h2 id="formTitle">活动录入</h2>
          <button class="btn-ghost" type="button" id="resetFormBtn">清空当前表单</button>
        </div>
        <div class="panel-body">
          <form id="activityForm" novalidate>
            <div class="form-grid">
              <div class="field">
                <label class="required" for="activityName">活动名称</label>
                <input id="activityName" name="activityName" autocomplete="off" placeholder="例如：秦港澳青年文化交流营">
              </div>
              <div class="field">
                <label for="activityLink">活动链接</label>
                <input id="activityLink" name="activityLink" type="url" autocomplete="off" placeholder="https://...">
              </div>
            </div>

            <div class="contacts" id="contacts"></div>

            <div class="toolbar">
              <div class="actions">
                <button class="btn-ghost" type="button" id="addContactBtn">+ 添加学校联系人</button>
              </div>
              <div class="actions">
                <button class="btn-primary" type="submit">加入待导出列表</button>
              </div>
            </div>
            <div class="message" id="formMessage" role="status" aria-live="polite"></div>
          </form>
        </div>
      </section>

      <section class="panel preview" aria-labelledby="previewTitle">
        <div class="panel-header">
          <h2 id="previewTitle">待导出明细</h2>
          <div class="row-actions">
            <button class="btn-success" type="button" id="exportBtn">导出 CSV</button>
            <button class="btn-danger" type="button" id="clearSavedBtn">清空列表</button>
          </div>
        </div>
        <div class="panel-body">
          <div id="emptyState" class="empty-state">暂无已保存记录</div>
          <div class="table-wrap" id="tableWrap" hidden>
            <table>
              <thead>
                <tr>
                  <th>活动名称</th>
                  <th>活动链接</th>
                  <th>参与学校</th>
                  <th>学校联系人</th>
                  <th>联系人身份</th>
                  <th>邮箱</th>
                  <th>电话</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="previewRows"></tbody>
            </table>
          </div>
          <p class="microcopy">CSV 会按“一个活动 + 一个学校联系人”展开为一行，中文按 UTF-8 BOM 导出。</p>
          <div class="message" id="listMessage" role="status" aria-live="polite"></div>
        </div>
      </section>
    </main>
  </div>

  <template id="contactTemplate">
    <div class="contact-row" data-contact>
      <div class="contact-title">
        <strong data-contact-title>学校联系人 1</strong>
        <button class="btn-danger" type="button" data-remove-contact>删除此联系人</button>
      </div>
      <div class="form-grid">
        <div class="field">
          <label class="required">参与学校</label>
          <input data-field="school" autocomplete="organization" placeholder="例如：香港中文大学">
        </div>
        <div class="field">
          <label class="required">学校联系人</label>
          <input data-field="contactName" autocomplete="name" placeholder="联系人姓名">
        </div>
        <div class="field">
          <label class="required">联系人身份</label>
          <select data-field="role">
            <option value="">请选择</option>
            <option value="学生">学生</option>
            <option value="老师">老师</option>
          </select>
        </div>
        <div class="field">
          <label>邮箱</label>
          <input data-field="email" type="email" autocomplete="email" placeholder="name@example.com">
        </div>
        <div class="field">
          <label>电话</label>
          <input data-field="phone" type="tel" autocomplete="tel" placeholder="手机号或固定电话">
        </div>
      </div>
    </div>
  </template>

  <script>
    const storageKey = "xjtu-hmt-activity-survey";
    const headers = ["活动名称", "活动链接", "参与学校", "学校联系人", "联系人身份", "邮箱", "电话"];
    const form = document.getElementById("activityForm");
    const contactsEl = document.getElementById("contacts");
    const contactTemplate = document.getElementById("contactTemplate");
    const formMessage = document.getElementById("formMessage");
    const listMessage = document.getElementById("listMessage");
    const previewRows = document.getElementById("previewRows");
    const emptyState = document.getElementById("emptyState");
    const tableWrap = document.getElementById("tableWrap");
    const activityCount = document.getElementById("activityCount");
    const rowCount = document.getElementById("rowCount");
    const schoolCount = document.getElementById("schoolCount");

    let savedRows = loadRows();

    function makeId() {
      return `${Date.now()}-${Math.random().toString(16).slice(2)}`;
    }

    function loadRows() {
      try {
        const raw = localStorage.getItem(storageKey);
        return raw ? JSON.parse(raw) : [];
      } catch {
        return [];
      }
    }

    function saveRows() {
      localStorage.setItem(storageKey, JSON.stringify(savedRows));
    }

    function setMessage(el, text, type) {
      el.textContent = text;
      el.className = text ? `message ${type}` : "message";
    }

    function clearMessages() {
      setMessage(formMessage, "", "");
      setMessage(listMessage, "", "");
    }

    function addContactRow(data = {}) {
      const clone = contactTemplate.content.firstElementChild.cloneNode(true);
      contactsEl.appendChild(clone);
      Object.entries(data).forEach(([key, value]) => {
        const input = clone.querySelector(`[data-field="${key}"]`);
        if (input) input.value = value;
      });
      clone.querySelector("[data-remove-contact]").addEventListener("click", () => {
        if (contactsEl.querySelectorAll("[data-contact]").length > 1) {
          clone.remove();
          updateContactTitles();
        }
      });
      updateContactTitles();
    }

    function updateContactTitles() {
      contactsEl.querySelectorAll("[data-contact]").forEach((row, index) => {
        row.querySelector("[data-contact-title]").textContent = `学校联系人 ${index + 1}`;
        row.querySelector("[data-remove-contact]").disabled = contactsEl.children.length === 1;
      });
    }

    function getContactRows() {
      return Array.from(contactsEl.querySelectorAll("[data-contact]"));
    }

    function fieldValue(row, key) {
      return row.querySelector(`[data-field="${key}"]`).value.trim();
    }

    function clearInvalidState() {
      form.querySelectorAll(".invalid").forEach((node) => node.classList.remove("invalid"));
    }

    function markInvalid(input) {
      input.classList.add("invalid");
    }

    function validateForm() {
      clearInvalidState();
      const errors = [];
      const activityNameInput = document.getElementById("activityName");
      const activityNameValue = activityNameInput.value.trim();

      if (!activityNameValue) {
        errors.push("活动名称为必填项。");
        markInvalid(activityNameInput);
      }

      getContactRows().forEach((row, index) => {
        const number = index + 1;
        const school = row.querySelector('[data-field="school"]');
        const contactName = row.querySelector('[data-field="contactName"]');
        const role = row.querySelector('[data-field="role"]');
        const email = row.querySelector('[data-field="email"]');
        const phone = row.querySelector('[data-field="phone"]');

        if (!school.value.trim()) {
          errors.push(`学校联系人 ${number}：参与学校为必填项。`);
          markInvalid(school);
        }
        if (!contactName.value.trim()) {
          errors.push(`学校联系人 ${number}：学校联系人为必填项。`);
          markInvalid(contactName);
        }
        if (!role.value.trim()) {
          errors.push(`学校联系人 ${number}：联系人身份为必填项。`);
          markInvalid(role);
        }
        if (!email.value.trim() && !phone.value.trim()) {
          errors.push(`学校联系人 ${number}：邮箱和电话至少填写一项。`);
          markInvalid(email);
          markInvalid(phone);
        }
      });

      return { valid: errors.length === 0, errors };
    }

    function rowsFromForm() {
      const activityName = document.getElementById("activityName").value.trim();
      const activityLink = document.getElementById("activityLink").value.trim();
      const activityId = makeId();
      return getContactRows().map((row) => ({
        id: makeId(),
        activityId,
        activityName,
        activityLink,
        school: fieldValue(row, "school"),
        contactName: fieldValue(row, "contactName"),
        role: fieldValue(row, "role"),
        email: fieldValue(row, "email"),
        phone: fieldValue(row, "phone")
      }));
    }

    function resetForm() {
      form.reset();
      contactsEl.innerHTML = "";
      addContactRow();
      clearInvalidState();
      setMessage(formMessage, "", "");
    }

    function renderPreview() {
      previewRows.innerHTML = "";
      savedRows.forEach((row) => {
        const tr = document.createElement("tr");
        const cells = [
          row.activityName,
          row.activityLink,
          row.school,
          row.contactName,
          row.role,
          row.email,
          row.phone
        ];
        cells.forEach((value, index) => {
          const td = document.createElement("td");
          if (index === 1 && value && value.startsWith && value.startsWith("http")) {
            const link = document.createElement("a");
            link.href = value;
            link.textContent = value;
            link.target = "_blank";
            link.rel = "noopener noreferrer";
            td.appendChild(link);
          } else {
            td.textContent = value || "";
          }
          tr.appendChild(td);
        });

        const actionTd = document.createElement("td");
        const deleteBtn = document.createElement("button");
        deleteBtn.type = "button";
        deleteBtn.className = "btn-danger";
        deleteBtn.textContent = "删除";
        deleteBtn.addEventListener("click", () => {
          savedRows = savedRows.filter((item) => item.id !== row.id);
          saveRows();
          renderPreview();
          setMessage(listMessage, "已删除该明细行。", "success");
        });
        actionTd.appendChild(deleteBtn);
        tr.appendChild(actionTd);
        previewRows.appendChild(tr);
      });

      const hasRows = savedRows.length > 0;
      emptyState.hidden = hasRows;
      tableWrap.hidden = !hasRows;
      rowCount.textContent = savedRows.length;
      activityCount.textContent = new Set(savedRows.map((row) => row.activityId)).size;
      schoolCount.textContent = new Set(savedRows.map((row) => row.school).filter(Boolean)).size;
    }

    function csvEscape(value) {
      const text = String(value ?? "");
      return `"${text.replace(/"/g, '""')}"`;
    }

    function buildCsv() {
      const lines = [
        headers.map(csvEscape).join(","),
        ...savedRows.map((row) => [
          row.activityName,
          row.activityLink,
          row.school,
          row.contactName,
          row.role,
          row.email,
          row.phone
        ].map(csvEscape).join(","))
      ];
      return `\uFEFF${lines.join("\r\n")}`;
    }

    function exportCsv() {
      if (savedRows.length === 0) {
        setMessage(listMessage, "暂无可导出的明细，请先加入至少一条活动记录。", "error");
        return;
      }

      const today = new Date().toISOString().slice(0, 10);
      const blob = new Blob([buildCsv()], { type: "text/csv;charset=utf-8;" });
      const url = URL.createObjectURL(blob);
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = `xjtu_hmt_activities_${today}.csv`;
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      URL.revokeObjectURL(url);
      setMessage(listMessage, `已导出 ${savedRows.length} 行 CSV 明细。`, "success");
    }

    document.getElementById("addContactBtn").addEventListener("click", () => addContactRow());
    document.getElementById("resetFormBtn").addEventListener("click", resetForm);
    document.getElementById("exportBtn").addEventListener("click", exportCsv);
    document.getElementById("clearSavedBtn").addEventListener("click", () => {
      if (savedRows.length === 0) {
        setMessage(listMessage, "当前列表已经为空。", "error");
        return;
      }
      const confirmed = window.confirm("确定清空所有待导出记录吗？");
      if (!confirmed) return;
      savedRows = [];
      saveRows();
      renderPreview();
      setMessage(listMessage, "已清空待导出列表。", "success");
    });

    form.addEventListener("submit", (event) => {
      event.preventDefault();
      clearMessages();
      const result = validateForm();
      if (!result.valid) {
        setMessage(formMessage, result.errors.join(" "), "error");
        const firstInvalid = form.querySelector(".invalid");
        if (firstInvalid) firstInvalid.focus();
        return;
      }

      const newRows = rowsFromForm();
      savedRows = [...savedRows, ...newRows];
      saveRows();
      renderPreview();
      resetForm();
      setMessage(formMessage, `已加入 ${newRows.length} 行待导出明细。`, "success");
    });

    addContactRow();
    renderPreview();
  </script>
</body>
</html>
